# ─── Browser Settings ───────────────────────────────────────────────
browser:
  headless: true          # true = run invisibly for max speed
  slow_mo: 0               # milliseconds between actions (0 = max speed)
  base_url: "https://corporate.bharatenglish.org"
  timeout: 30000           # max wait time for elements in milliseconds

# ─── Groq AI Model Configuration ────────────────────────────────────
ai:
  # Text generation model (FREE on Groq — best general purpose model)
  chat_model: "llama-3.3-70b-versatile"
  
  # Audio transcription model (FREE — whisper-large-v3-turbo is faster than v3)
  stt_model: "whisper-large-v3-turbo"
  
  # Text-to-speech model (FREE — Orpheus is Groq's native TTS)
  # NOTE: You must accept terms at https://console.groq.com/playground?model=canopylabs%2Forpheus-v1-english
  tts_model: "canopylabs/orpheus-v1-english"
  tts_voice: "austin"      # Options: austin, brianna, jedediah, mckenna, sterling, orion
  
  # Controls how creative/random the LLM answers are (0.0 = focused, 1.0 = creative)
  temperature: 0.3
  max_tokens: 1000

# ─── UI Selectors ───────────────────────────────────────────────────
selectors:
  login:
    username_input: "#username"
    password_input: "#password"
    signin_button: "button:has-text('Sign in')"
    error_message: ".error-message, .alert-danger"

  navigation:
    sidebar_home: "a:has-text('Home')"
    sidebar_ai_bet: "a:has-text('AI Bet')"
    sidebar_ai_fluentedge: "a:has-text('AI FluentEdge')"
    sidebar_reports: "a:has-text('Reports')"

  fluentedge:
    listening_start: "h2:has-text('Listening') + p + button"
    speaking_start: "h2:has-text('Speaking') + p + button"
    reading_start: "h2:has-text('Reading') + p + button"
    writing_start: "h2:has-text('Writing') + p + button"

  levels:
    start_button: "button:has-text('Start')"
    revisit_button: "button:has-text('Revisit')"

  units:
    start_learning: "button:has-text('Start Learning')"
    review: "button:has-text('Review')"

  lessons:
    practice_button: "button:has-text('Practice')"
    learn_button: "button:has-text('Learn')"

  exam:
    textarea: "textarea[placeholder*='Start writing']"
    mic_button: "button[hint='Record'], button[aria-label='Start recording'], button[aria-label='Stop recording'], button[aria-label*='recording'], button[aria-label*='record']"
    check_button: "button:has-text('Check')"
    continue_button: "button:has-text('Continue'), button:has-text('Submit'), button:has-text('Next')"
    close_button: "button[aria-label='Close practice'], button[hint='Close practice']"
    exit_button: "button:has-text('Exit')"
    play_audio: "button[aria-label='Play audio'], button[hint='Play audio']"
    option_selectors:
      - "div.cursor-pointer"
      - "div.cursor-pointer.shadow-md"
      - ".option"
      - "div[role='button']"
      - ".choice"
      - "li.answer"
      - "button.option-btn"

# ─── Paths ──────────────────────────────────────────────────────────
paths:
  temp_audio_dir: "./temp"
  log_file: "./logs/bot.log"
